name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build Release
        run: swift build -c release
      
      - name: Create DMG
        run: bash scripts/make-dmg.sh
      
      - name: Calculate SHA256
        id: sha256
        run: |
          SHA256=$(shasum -a 256 dist/SoundVibe.dmg | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
      
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/SoundVibe.dmg
          body: |
            ## SoundVibe v${{ steps.version.outputs.version }}
            
            ### Installation
            
            **Via Homebrew (recommended):**
            ```bash
            brew tap bhavpreet/soundvibe
            brew install --cask soundvibe
            ```
            
            **Manual Installation:**
            1. Download `SoundVibe.dmg` below
            2. Open the DMG and drag SoundVibe to Applications
            3. Launch SoundVibe from Applications
            
            ### Checksums
            - **SHA256:** `${{ steps.sha256.outputs.sha256 }}`
            
            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - Apple Silicon (M1/M2/M3)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Output Cask Update Instructions
        run: |
          echo "::notice::Update Casks/soundvibe.rb with:"
          echo "::notice::  version \"${{ steps.version.outputs.version }}\""
          echo "::notice::  sha256 \"${{ steps.sha256.outputs.sha256 }}\""
